version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tradematch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tradematch_dev
      POSTGRES_USER: tradematch_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./apps/api/database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradematch_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradematch-network

  # Redis for Pub/Sub
  redis:
    image: redis:7-alpine
    container_name: tradematch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass dev_redis_123
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tradematch-network

  # API Instance 1
  api-1:
    image: tradematch/api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: tradematch-api-1
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://tradematch_user:dev_password_123@postgres:5432/tradematch_dev?sslmode=disable
      - REDIS_URL=redis://:dev_redis_123@redis:6379
      - JWT_SECRET=dev_jwt_secret_change_this_in_production
      - CORS_ORIGINS=http://localhost:8080,http://localhost:3000
      - FRONTEND_URL=http://localhost:8080
      - PUBLIC_URL=http://localhost:8080
    ports:
      - "3001:3001"
    volumes:
      - ./logs:/app/logs
      - public-uploads:/app/public/uploads
    networks:
      - tradematch-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # API Instance 2
  api-2:
    image: tradematch/api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: tradematch-api-2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://tradematch_user:dev_password_123@postgres:5432/tradematch_dev?sslmode=disable
      - REDIS_URL=redis://:dev_redis_123@redis:6379
      - JWT_SECRET=dev_jwt_secret_change_this_in_production
      - CORS_ORIGINS=http://localhost:8080,http://localhost:3000
      - FRONTEND_URL=http://localhost:8080
      - PUBLIC_URL=http://localhost:8080
    ports:
      - "3002:3001"
    volumes:
      - ./logs:/app/logs
      - public-uploads:/app/public/uploads
    networks:
      - tradematch-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: tradematch-nginx
    restart: unless-stopped
    depends_on:
      - api-1
      - api-2
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - tradematch-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend static file server
  frontend:
    image: nginx:alpine
    container_name: tradematch-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./docker/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tradematch-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  public-uploads:
    driver: local

networks:
  tradematch-network:
    driver: bridge
