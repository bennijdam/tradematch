version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    container_name: tradematch-api
    ports:
      - "3000:3000"
    env_file:
      - ../.env
      - ../.env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    container_name: tradematch-web
    ports:
      - "8080:8080"
    env_file:
      - ../.env
      - ../.env.local
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    depends_on:
      - api
