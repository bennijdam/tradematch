worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Limits
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=websocket:10m rate=100r/m;

    upstream tradematch_backend {
        ip_hash; # Sticky sessions for WebSocket
        server api-1:3001 max_fails=3 fail_timeout=30s weight=1;
        server api-2:3001 max_fails=3 fail_timeout=30s weight=1;
    }

    server {
        listen 80;
        server_name localhost;

        # Handle WebSocket upgrades
        location /ws {
            proxy_pass http://tradematch_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout settings
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Buffer settings
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Rate limiting
            limit_req zone=websocket burst=20 nodelay;

            # Health check path
            location /ws/health {
                access_log off;
                proxy_pass http://tradematch_backend/health;
            }
        }

        # Regular API endpoints
        location /api {
            proxy_pass http://tradematch_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

            # Handle OPTIONS
            if ($request_method = 'OPTIONS') {
                return 204;
            }

            # Rate limiting
            limit_req zone=api burst=10 nodelay;
        }

        # Health check endpoint
        location /health {
            access_log off;
            proxy_pass http://tradematch_backend/health;
        }

        # Status page
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            deny all;
        }
    }
}
